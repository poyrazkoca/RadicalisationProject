<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="try.css" />
        <title>Before After Effect</title>
    </head>
    <body>
        <div class="ba-wrapper">

            </div>
            <div class="ba-labels">
                <span class="ba-label ba-label-left">Öncesi</span>

            </div>
        </div>
        <script src="try.js"></script>

</html>
    <div class="ba-toggle">
        <button id="ba-btn" class="ba-btn">Show After</button>
    </div>
</div>
